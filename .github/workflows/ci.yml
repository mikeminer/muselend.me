name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { submodules: recursive }
      - uses: pnpm/action-setup@v6
        with: { version: 10.25.0 }
      - uses: actions/setup-node@v5
        with: { node-version: 20.19.0, cache: pnpm }
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: v1.7.1 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint --filter='!@muselend/contracts'
      - run: pnpm typecheck --filter='!@muselend/contracts'
      - run: pnpm test --filter='!@muselend/contracts'
      - run: pnpm build --filter='!@muselend/contracts'
      - run: pnpm audit --audit-level high
      - run: pnpm --filter @muselend/web exec playwright install --with-deps chromium
      - working-directory: packages/contracts
        run: |
          forge install foundry-rs/forge-std@v1.16.2 --no-git
          forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 --no-git
      - working-directory: packages/contracts
        run: forge build
      - run: pnpm --filter @muselend/web test:e2e
        env: { RUN_ANVIL_E2E: "1" }
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: v1.7.1 }
      - working-directory: packages/contracts
        run: |
          forge install foundry-rs/forge-std@v1.16.2 --no-git
          forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 --no-git
      - working-directory: packages/contracts
        run: forge fmt --check
      - working-directory: packages/contracts
        run: forge build --sizes
      - working-directory: packages/contracts
        env: { FOUNDRY_PROFILE: ci }
        run: forge test
      - run: pipx install slither-analyzer==0.11.5
      - working-directory: packages/contracts
        run: slither . --foundry-out-directory out --filter-paths "lib" --fail-high
